reference:
  # General getters shared across classes
  - title: General getters
    desc: 
      All types of general getters that work across various classes related to
      co-expression module detection, graph-based clustering, etc.
    contents:
      - get_metadata
      - get_params
      - get_results
  # Everything, anything for gene set enrichment
  - title: Gene set enrichment helpers
    desc: 
      Everything and anything you need to do various types of gene set 
      enrichments; hypergeometric tests, GSVA, (ss)GSEA.
    contents:
      - gse_hypergeometric
      - gse_hypergeometric_list
      - calc_fgsea
      - calc_fgsea_simple
      - calc_gsea_traditional
      - calc_mitch
      - calc_gsva
      - calc_ssgsea
      - params_gsea
      - params_gsva
      - params_ssgsea
  # Gene Ontology-related functions
  - title: Gene Ontology-related gene set enrichment helpers
    desc: 
      GSE methods specifically designed with the DAG of the Gene Ontology in
      mind, identifying the most relevant Gene Ontology terms.
    contents:
      - load_go_human_data
      - get_go_data_human
      - process_go_data
      - GeneOntologyElim
      - gse_go_elim_method
      - gse_go_elim_method_list
      - fgsea_go_elim
      - fgsea_simple_go_elim
      - simplify_hypergeom_res
  # CisTarget
  - title: CisTarget-related helpers
    desc: 
      Functions related to CisTarget enrichment.
    contents:
      - download_cistarget_hg38
      - read_motif_annotation_file
      - read_motif_ranking
      - run_cistarget
      - params_cistarget
  # Correlation-based gene module stuff
  - title: Correlation-based gene module detections
    desc: 
      Methods to identify co-expression modules via correlations in the data.
      Includes methods for differential correlations, some graph-based and some
      hierarchical clustering based ones.
    contents:
      - BulkCoExp
      - preprocess_bulk_coexp
      - cor_module_check_epsilon
      - cor_module_coremo_clustering
      - cor_module_coremo_cor_sign
      - cor_module_coremo_eigengene
      - cor_module_coremo_stability
      - cor_module_graph_check_res
      - cor_module_graph_final_modules
