url: ~
template:
  bootstrap: 5
  bootswatch: darkly
  bslib:
    bg: "#0d1b2e"
    fg: "#e0e0e0"
    primary: "#e07a5a"
    secondary: "#7ba7bc"
    navbar-bg: "#08111e"
    code-bg: "#0a1628"
    border-radius: 0.4rem
    btn-border-radius: 0.4rem
  css: pkgdown/extra.css

navbar:
  structure:
    left:
      - intro
      - reference
      - articles
      - tutorials
      - news
    right:
      - search
      - github
      - lightswitch
  components:
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Articles
      href: articles/index.html

articles:
  - title: Articles
    contents:
      - rust_functions
  - title: Tutorials
    contents:
      - Single_cell_analysis
      - gse_methods
      - pathway_activity
      - genetic_diffusions
      - cpca

