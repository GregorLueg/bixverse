      - get_cor_graph
      - get_diffcor_graph
      - get_epsilon_res
      - get_resolution_res
      - get_outputs
      - params_cor_graph
      - params_coremo
  # Matrix factorisations for gene module detection
  - title: Matrix factorisation methods
    desc: 
      Methods to identify co-expression via matrix factorisations. Uses the same 
      class as the correlation-based ones. You have contrastive PCA, ICA and
      dual graph-regularised dictionary learning as methods.
    contents:
