url: https://gregorlueg.github.io/bixverse/

template:
  bootstrap: 5
  bootswatch: darkly
  bslib:
    bg: "#0d1b2e"
    fg: "#e0e0e0"
    primary: "#e07a5a"
    secondary: "#7ba7bc"
    navbar-bg: "#08111e"
    code-bg: "#0a1628"
    border-radius: 0.4rem
    btn-border-radius: 0.4rem
  css: pkgdown/extra.css

home:
  title: bixverse
  description: 
    The tidyverse wanna-be of bioinformatics. Now also with a lot of single 
    cell-related functionality for scaling to millions of cells on local 
    compute.
navbar:
  structure:
    left: [intro, reference, articles, tutorials, singlecells, news]
    right: [search, github]
  components:
    tutorials:
      text: Tutorials
      menu:
        - text: Gene Set Enrichment Methods
          href: articles/gse_methods.html
        - text: Pathway activity functions
          href: articles/pathway_activity.html
        - text: Genetic diffusion and community detections
          href: articles/genetic_diffusions.html
        - text: Contrastive PCA
          href: articles/cpca.html
        - text: Semantic similarities on ontologies
          href: articles/ontologies.html
    singlecells:
      text: Single Cells
      menu:
        - text: "Intro vignettes"
        - text: "Thinking about single cells the bixverse way"
          href: articles/thinking_single_cell.html
        - text: "PBMC analysis with the bixverse single cell framework"
          href: articles/pbmc_single_cell.html
        - text: "Reading data in (single-cell I/O)"
          href: articles/single_cell_io.html
        - text: "Doublet detection in bixverse"
          href: articles/doublet_detection.html
        - text: "Batch corrections"
          href: articles/single_cell_batch_corrections.html
        - text: "kNN searches for single cells in bixverse"
          href: articles/knn_searches.html
        - text: -------
        - text: "More advanced analysis methods"
        - text: "'Bag of genes' methods for single cell in bixverse"
          href: articles/bag_of_genes_single_cells.html
        - text: "Ligand receptor analysis"
          href: articles/nichenet.html
        - text: "Meta cells - generation and analysis"
          href: articles/meta_cells.html
        - text: "Reference mapping via Symphony"
          href: articles/symphony.html
        - text: "Multi-modal analysis"
          href: articles/multi_modal_single_cells.html
        - text: -------
        - text: "Others"
        - text: Analysing 1 million cells on a laptop
          href: articles/single_cell_big_data.html
        - text: Plotting helpers
          href: articles/single_cell_visualisation.html
    articles:
      text: Articles
      menu:
        - text: Bixverse R <> Rust interface
          href: articles/rust_functions.html
        - text: Technical design choices for single cell
          href: articles/design_single_cell.html
    github:
      icon: fab fa-github
      href: https://github.com/GregorLueg/bixverse
      aria-label: GitHub

articles:
  - title: Articles
    navbar: Articles
    contents:
      - rust_functions
